# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: blank
first_name: Lydia
middle_name:
last_name: Chien
contact_note:
description: >
  Robotics researcher at NYCU EE — tactile manipulation, imitation learning, multi-UAV systems. ITRI intern building autonomous robot arms and VR teleoperation.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
keywords: robotics, manipulation, tactile sensing, imitation learning, UWB, ROS2
lang: en
icon: 🤖
url: https://huihsin-chien.github.io
baseurl: ""
last_updated: false
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
theme: al_folio_core

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: false

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

# -----------------------------------------------------------------------------
# al-folio API
# -----------------------------------------------------------------------------
al_folio:
  api_version: 1
  style_engine: tailwind
  tailwind:
    version: 4.1.18
    preflight: false
    css_entry: assets/tailwind/app.css
  distill:
    engine: distillpub-template
    source: al-org-dev/distill-template#al-folio
    allow_remote_loader: true

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------
feed:
  tabs:
    - blog

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
navbar_fixed: true
footer_fixed: false
search_enabled: true
socials_in_search: true
bib_search: false

max_width: 950px

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------
serve_og_meta: false
serve_schema_org: false
og_image:

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------
blog_name: Lydia Chien
blog_nav_title: blog
blog_description: notes on robotics & research
permalink: /blog/:year/:title/

# Pagination
pagination:
  enabled: true

related_blog_posts:
  enabled: true
  max_related: 5

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/
  publications:
    defaults:
      layout: bib
    output: true
    permalink: /publications/:path/
  teaching:
    output: true
    permalink: /teaching/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      is_post: true
      comments: false
  - scope:
      path: ""
      type: projects
    values:
      layout: page
      is_project: true
  - scope:
      path: ""
      type: publications
    values:
      layout: bib
      is_publication: true

# -----------------------------------------------------------------------------
# Scholar / Bib
# -----------------------------------------------------------------------------
scholar:
  last_name: [Chien]
  first_name: [Lydia, Hui-Hsin]
  style: apa
  locale: en
  sort_by: year
  order: descending
  group_by: none
  group_order: descending
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [superscript, indent]
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_link: Details
  query: "@*"

enable_publication_thumbnails: true
enable_publication_badges:
  altmetric: false
  dimensions: false
  google_scholar: false

# -----------------------------------------------------------------------------
# Misc
# -----------------------------------------------------------------------------
enable_darkmode: true
enable_navbar_social: false
enable_project_categories: true
enable_medium_zoom: true
enable_progressbar: true
enable_video_embedding: true
enable_cookie_consent: false
imagemagick:
  enabled: false

serve_videos_locally: true

# -----------------------------------------------------------------------------
# Jekyll
# -----------------------------------------------------------------------------

include:
  - _pages

exclude:
  - bin/
  - docs/
  - test/
  - lighthouse_results/
  - readme_preview/
  - AGENTS.md
  - CLAUDE.md
  - Dockerfile
  - LICENSE
  - README.md
  - package.json
  - package-lock.json
  - requirements.txt
  - purgecss.config.js
  - docker-compose.yml
  - docker-compose-slim.yml
  - .pre-commit-config.yaml
  - .prettierrc
  - .prettierignore
  - .lycheeignore
  - .git-blame-ignore-revs
  - .gitattributes
  - .gitignore
  - .all-contributorsrc

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

sass:
  style: compressed

plugins:
  # al-folio plugin ecosystem
  - al_folio_core
  - al_folio_distill
  - al_folio_cv
  - al_folio_bootstrap_compat
  - al_icons
  - al_cookie
  - al_analytics
  - al_citations
  - al_comments
  - al_ext_posts
  - al_img_tools
  - al_search
  - al_charts
  - al_math
  - al_newsletter
  # jekyll plugins (auto-loaded via :jekyll_plugins group — only list if not in that group)
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# jekyll-link-attributes
# -----------------------------------------------------------------------------
external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:
    - "huihsin-chien.github.io"

# -----------------------------------------------------------------------------
# jekyll-minifier
# -----------------------------------------------------------------------------
jekyll-minifier:
  enabled: false
  compress_css: false
  compress_javascript: false

# -----------------------------------------------------------------------------
# jekyll-archives
# -----------------------------------------------------------------------------
jekyll-archives:
  posts:
    enabled: ["year", "tags", "categories"]
    layout: archive
    permalinks:
      year: "/blog/:year/"
      tags: "/blog/tag/:name/"
      categories: "/blog/category/:name/"

# tailwind config override to avoid breaking .fixed-top
tailwind_ignore:
  - "fixed"

# -----------------------------------------------------------------------------
# Third-party libraries (CDN)
# Required by jekyll-3rd-party-libraries gem (crashes if key is absent)
# -----------------------------------------------------------------------------
third_party_libraries:
  download: false
  fontawesome:
    version: "7.2.0"
    url:
      css: "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@{{version}}/css/all.min.css"
    integrity:
      css: ""
  academicons:
    version: "1.9.5"
    url:
      css: "https://cdn.jsdelivr.net/npm/academicons@{{version}}/css/academicons.min.css"
    integrity:
      css: ""
  scholar-icons:
    version: "1.0.3"
    url:
      css: "https://cdn.jsdelivr.net/npm/scholar-icons@{{version}}/css/scholar-icons.css"
    integrity:
      css: ""
  tikzjax:
    version: "0.2.5"
    url:
      js: "https://cdn.jsdelivr.net/npm/tikzjax@{{version}}/tikzjax.js"
  tocbot:
    version: "4.32.2"
    url:
      css: "https://cdn.jsdelivr.net/npm/tocbot@{{version}}/dist/tocbot.css"
      js: "https://cdn.jsdelivr.net/npm/tocbot@{{version}}/dist/tocbot.min.js"
