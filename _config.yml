# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: blank
first_name: Lydia
middle_name:
last_name: Chien
contact_note:
description: >
  Robotics researcher at NYCU EE — tactile manipulation, imitation learning, multi-UAV systems. ITRI intern building autonomous robot arms and VR teleoperation.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
keywords: robotics, manipulation, tactile sensing, imitation learning, UWB, ROS2
lang: en
icon: 🤖
url: https://huihsin-chien.github.io
baseurl: ""
last_updated: false
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: false

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

# -----------------------------------------------------------------------------
# al-folio API
# -----------------------------------------------------------------------------
al_folio:
  api_version: 1
  style_engine: tailwind
  tailwind:
    version: 4.1.18
    preflight: false
    css_entry: assets/tailwind/app.css
  distill:
    engine: distillpub-template
    source: al-org-dev/distill-template#al-folio
    allow_remote_loader: true

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------
feed:
  tabs:
    - blog

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
navbar_fixed: true
footer_fixed: false
search_enabled: true
socials_in_search: true
bib_search: false

max_width: 950px

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------
serve_og_meta: false
serve_schema_org: false
og_image:

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------
blog_name: Lydia Chien
blog_nav_title: blog
blog_description: notes on robotics & research
permalink: /blog/:year/:title/

# Pagination
pagination:
  enabled: true

related_blog_posts:
  enabled: true
  max_related: 5

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/
  publications:
    defaults:
      layout: bib
    output: true
    permalink: /publications/:path/
  teaching:
    output: true
    permalink: /teaching/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      is_post: true
      comments: false
  - scope:
      path: ""
      type: projects
    values:
      layout: page
      is_project: true
  - scope:
      path: ""
      type: publications
    values:
      layout: bib
      is_publication: true

# -----------------------------------------------------------------------------
# Scholar / Bib
# -----------------------------------------------------------------------------
scholar:
  last_name: [Chien]
  first_name: [Lydia, Hui-Hsin]
  style: apa
  locale: en
  sort_by: year
  order: descending
  group_by: none
  group_order: descending
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [superscript, indent]
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_link: Details
  query: "@*"

enable_publication_thumbnails: true
enable_publication_badges:
  altmetric: false
  dimensions: false
  google_scholar: false

# -----------------------------------------------------------------------------
# Misc
# -----------------------------------------------------------------------------
enable_darkmode: true
enable_navbar_social: false
enable_project_categories: true
enable_medium_zoom: true
enable_progressbar: true
enable_video_embedding: true
enable_cookie_consent: false
imagemagick:
  enabled: false

serve_videos_locally: true

# -----------------------------------------------------------------------------
# Jekyll
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

sass:
  style: compressed

plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# jekyll-link-attributes
# -----------------------------------------------------------------------------
external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:
    - "huihsin-chien.github.io"

# -----------------------------------------------------------------------------
# jekyll-minifier
# -----------------------------------------------------------------------------
jekyll-minifier:
  compress_css: true
  compress_javascript: false

# -----------------------------------------------------------------------------
# jekyll-archives
# -----------------------------------------------------------------------------
jekyll-archives:
  enabled: [year, tags, categories]
  layouts:
    year: archive-year
    tag: archive-tag
    category: archive-category
  permalinks:
    year: "/blog/:year/"
    tag: "/blog/tag/:name/"
    category: "/blog/category/:name/"

# tailwind config override to avoid breaking .fixed-top
tailwind_ignore:
  - "fixed"
