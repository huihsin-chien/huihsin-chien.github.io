name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!docs/CONTRIBUTING.md"
      - "!docs/CUSTOMIZE.md"
      - "!docs/FAQ.md"
      - "!docs/INSTALL.md"
      - "!README.md"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!docs/CONTRIBUTING.md"
      - "!docs/CUSTOMIZE.md"
      - "!docs/FAQ.md"
      - "!docs/INSTALL.md"
      - "!README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip" # caching pip dependencies
      - name: Setup Node 🧰
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install JS deps 📦
        run: npm ci
      - name: Configure Pages ⚙️
        id: pages
        uses: actions/configure-pages@v5
      - name: Install system deps 🔧
        run: sudo apt-get update && sudo apt-get install -y imagemagick
      - name: Install Python deps 🐍
        run: pip3 install --upgrade nbconvert
      - name: Build Jekyll 🏗️
        run: |
          echo "base_path='${{ steps.pages.outputs.base_path }}'"
          export JEKYLL_ENV=production
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}" --trace 2>&1 | tee /tmp/jekyll-build.log
          exit ${PIPESTATUS[0]}
      - name: Upload build log 📋
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-build-log
          path: /tmp/jekyll-build.log
          retention-days: 1
      - name: List _site contents 🔍
        run: |
          echo "=== _site root ===" && ls -la _site/ || echo "NO _site DIRECTORY"
          echo "=== index.html ===" && ls -la _site/index.html 2>&1 || echo "NO index.html"
          echo "=== total files ===" && find _site -type f | wc -l
      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4
